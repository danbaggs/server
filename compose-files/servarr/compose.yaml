services:

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      - wireguard
    volumes:
      - ${BASE_PATH}/config/prowlarr/config:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    restart: unless-stopped
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20
    network_mode: "service:wireguard"

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    depends_on:
      - wireguard
    environment:
      PUID: 1000
      PGID: 1000
      LOG_LEVEL: debug
    restart: unless-stopped
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20
    network_mode: "service:wireguard"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    depends_on:
      - wireguard
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    # ports:
    #   - 6767:6767
    volumes:
      - ${BASE_PATH}/config/bazarr/config:/config
      - /data:/transcend # All the media containers use transcend internally because that's what i set originally. It's too much work to change it now.
    restart: unless-stopped
    network_mode: "service:wireguard"
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20

