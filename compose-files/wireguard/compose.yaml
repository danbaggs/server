services:
  wireguard:
    image: linuxserver/wireguard:version-v1.0.20210914
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    sysctls:
      - "net.ipv6.conf.all.disable_ipv6=0"  # This bypasses Docker weirdness with ipv6
      - "net.ipv4.conf.all.src_valid_mark=1"
    ports:  # map all svc you wanna route through VPN
      - 51820:51820/udp
      - 54914:54914
      - 9091:9091 # Transmission Web UI
      - 8191:8191 # Flaresolverr
      - 9696:9696 # Prowlarr
      - 6767:6767 # Bazarr
      - 8787:8787 # Readarr
    volumes:
      - /lib/modules:/lib/modules
      - ${BASE_PATH}/config/wireguard/se-got-wg-001.conf:/config/wg_confs/wg0.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ip link show wg0 | grep -q 'UP' && curl -s --max-time 5 https://1.1.1.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - homelab

  transmission:
    image: linuxserver/transmission:4.1.0
    container_name: transmission
    devices:
      - /dev/net/tun
    volumes:
      - ${BASE_PATH}/config/transmission-home:/config
      - /data:/transcend # All the media containers use transcend internally because that's what i set originally. It's too much work to change it now.
    depends_on:
      - wireguard
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      PEERPORT: 54914
    healthcheck:
      test: ["CMD-SHELL", "transmission-remote localhost:9091 -n '${USER:-admin}:${PASS:-password}' -l || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    network_mode: "service:wireguard"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    depends_on:
      - wireguard
    volumes:
      - ${BASE_PATH}/config/prowlarr/config:/config
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    restart: unless-stopped
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20
    network_mode: "service:wireguard"

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    depends_on:
      - wireguard
    environment:
      PUID: 1000
      PGID: 1000
      LOG_LEVEL: debug
    restart: unless-stopped
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20
    network_mode: "service:wireguard"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    depends_on:
      - wireguard
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
    # ports:
    #   - 6767:6767
    volumes:
      - ${BASE_PATH}/config/bazarr/config:/config
      - /data:/transcend # All the media containers use transcend internally because that's what i set originally. It's too much work to change it now.
    restart: unless-stopped
    network_mode: "service:wireguard"
    healthcheck:
      # Verify that the wireguard container is running
      test: ["CMD", "curl", "-f", "http://localhost:9091"] 
      interval: 30s
      timeout: 2s
      retries: 20
