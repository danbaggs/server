- Tools:
    - Pihole:
        icon: pi-hole.png
        description: "Network-wide Ad Blocking"
        href: http://192.168.0.150:80/admin
        widget:
          type: pihole
          url: http://192.168.0.150:80
          version: 6
          key: {{HOMEPAGE_VAR_PIHOLE_PASSWORD}}
    - Home Assistant:
        icon: home-assistant.png
        description: Home Assistant
        href: http://192.168.0.92:8123
        widget:
          type: homeassistant
          url: http://192.168.0.92:8123
          key: {{HOMEPAGE_VAR_HOME_ASSISTANT_TOKEN}}
          custom:
            - template: "{{ states.switch|selectattr('state','equalto','on')|list|length }}"
              label: switches on
            - state: weather.forecast_home
              label: wind speed
              value: "{attributes.wind_speed} {attributes.wind_speed_unit}"
